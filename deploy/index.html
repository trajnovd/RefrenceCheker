<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trajanov — Digital Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f172a;
      --bg-2: #1e293b;
      --accent: #6366f1;
      --accent-dim: #4338ca;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(99, 102, 241, 0.2);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle animated background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(67, 56, 202, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Geometric decoration */
    .geo {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .geo-ring {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      border: 1px solid var(--border);
      animation: ring-pulse 6s ease-in-out infinite;
    }

    .geo-ring-2 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.08);
      animation: ring-pulse 6s ease-in-out infinite 1.5s;
    }

    .geo-ring-3 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1200px;
      height: 1200px;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.04);
      animation: ring-pulse 6s ease-in-out infinite 3s;
    }

    @keyframes ring-pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.02); }
    }

    /* Corner accent lines */
    .geo-line-h {
      top: 50%;
      left: 50%;
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      transform: translate(-50%, -50%) translateX(260px);
      animation: line-fade 4s ease-in-out infinite;
    }

    .geo-line-v {
      top: 50%;
      left: 50%;
      width: 1px;
      height: 60px;
      background: linear-gradient(180deg, var(--accent), transparent);
      transform: translate(-50%, -50%) translateY(260px);
      animation: line-fade 4s ease-in-out infinite 2s;
    }

    @keyframes line-fade {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* Main layout */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .content {
      text-align: center;
      max-width: 640px;
      width: 100%;
    }

    /* Wordmark / logo area */
    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .wordmark-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot-pulse 2.5s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
      50%       { opacity: 0.8; box-shadow: 0 0 0 8px rgba(99, 102, 241, 0); }
    }

    .wordmark-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Heading */
    h1 {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 1.5rem;
      border-radius: 2px;
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(0.95rem, 2.5vw, 1.125rem);
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    /* CTA link */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.35);
      border-radius: 6px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .cta:hover {
      background: rgba(99, 102, 241, 0.18);
      border-color: rgba(99, 102, 241, 0.6);
      color: #fff;
    }

    .cta-arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .cta:hover .cta-arrow {
      transform: translateX(3px);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      padding: 1.5rem;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    footer p {
      font-size: 0.8125rem;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .geo-ring  { width: 320px; height: 320px; }
      .geo-ring-2 { width: 500px; height: 500px; }
      .geo-ring-3 { width: 700px; height: 700px; }
      .geo-line-h { transform: translate(-50%, -50%) translateX(140px); }
      .geo-line-v { transform: translate(-50%, -50%) translateY(140px); }
    }
  </style>
</head>
<body>

  <!-- Geometric decoration -->
  <div class="geo geo-ring"></div>
  <div class="geo geo-ring-2"></div>
  <div class="geo geo-ring-3"></div>
  <div class="geo geo-line-h"></div>
  <div class="geo geo-line-v"></div>

  <main>
    <div class="content">

      <div class="wordmark">
        <span class="wordmark-dot"></span>
        <span class="wordmark-label">Digital Solutions</span>
      </div>

      <h1>Trajanov</h1>

      <div class="divider"></div>

      <p class="subtitle">Something is being built here.<br>Coming soon.</p>

      <a href="/referencefinder" class="cta">
        Try References Checker
        <span class="cta-arrow">&#8594;</span>
      </a>

    </div>
  </main>

  <footer>
    <p>&copy; 2026 Trajanov. All rights reserved.</p>
  </footer>

</body>
</html>
